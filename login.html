<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Login - कृषिMitra 🌾</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background-size: cover;
  background-position: center;
  transition: background 1s ease-in-out;
  position: relative;
}

/* Login Form Box */
.login-box {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 20px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  animation: fadeIn 2s ease;
}

.login-box h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
  color: #16a34a;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
}

.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #16a34a;
  color: white;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover {
  background: #15803d;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Language selector at top-right */
.lang-select {
  position: absolute;
  top: 20px;
  right: 20px;
}
</style>
</head>
<body>

<!-- Language Selector -->
<div class="lang-select">
  <label for="langSelect">Language: </label>
  <select id="langSelect">
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
    <option value="mr">मराठी</option>
  </select>
</div>

<!-- Login Form -->
<div class="login-box">
  <h1 id="loginTitle">Farmer Login</h1>
  <form action="php/login.php" method="POST">
  <input type="text" name="email" placeholder="Email" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit" id="loginBtn">Farmer Login</button>
</form>
</div>

<script>
// Animated Background
const backgrounds = [
  'images/b1.jpg',
  'images/b2.jpg',
  'images/b3.jpg',
  'images/b4.jpg',
  'images/b5.jpg'
];
let bgIndex = 0;
function changeBackground() {
  document.body.style.backgroundImage = `url('${backgrounds[bgIndex]}')`;
  bgIndex = (bgIndex + 1) % backgrounds.length;
}
changeBackground();
setInterval(changeBackground, 5000);

// Multilingual Text for Farmer Login
const translations = {
  en: { loginTitle: "Farmer Login", loginBtn: "Farmer Login" },
  hi: { loginTitle: "किसान लॉगिन", loginBtn: "किसान लॉगिन" },
  mr: { loginTitle: "शेतकरी लॉगिन", loginBtn: "शेतकरी लॉगिन" }
};

const langSelect = document.getElementById('langSelect');
langSelect.addEventListener('change', ()=>{
  const lang = langSelect.value;
  document.getElementById('loginTitle').innerText = translations[lang].loginTitle;
  document.getElementById('loginBtn').innerText = translations[lang].loginBtn;
});

// Redirect to dashboard on login
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  // You can add username/password validation here if needed
  window.location.href = 'dashboard.html'; // Redirect to dashboard page
});
</script>

</body>
</html>
