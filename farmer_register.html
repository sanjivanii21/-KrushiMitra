<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Registration - कृषिMitra 🌾</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background-size: cover;
  background-position: center;
  transition: background 1s ease-in-out;
  position: relative;
}

.login-box {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 20px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.login-box h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
  color: #16a34a;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
}

.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #16a34a;
  color: white;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
}

.login-box button:hover {
  background: #15803d;
}

.register-link{
  margin-top:15px;
}

.register-link a{
  color:#90ee90;
  text-decoration:none;
}

.lang-select {
  position: absolute;
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<div class="lang-select">
  <label>Language:</label>
  <select id="langSelect">
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
    <option value="mr">मराठी</option>
  </select>
</div>

<div class="login-box">

  <h1 id="title">Farmer Registration</h1>

  <form action="php/register.php" method="POST">

    <input type="text"
           name="full_name"
           placeholder="Full Name"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit" id="registerBtn">
      Register
    </button>

  </form>

  <div class="register-link">
      <a href="login.html">
          Already have an account? Login
      </a>
  </div>

</div>

<script>

const backgrounds = [
  'images/b1.jpg',
  'images/b2.jpg',
  'images/b3.jpg',
  'images/b4.jpg',
  'images/b5.jpg'
];

let bgIndex = 0;

function changeBackground() {
  document.body.style.backgroundImage =
  `url('${backgrounds[bgIndex]}')`;

  bgIndex = (bgIndex + 1) % backgrounds.length;
}

changeBackground();
setInterval(changeBackground, 5000);

</script>

</body>
</html>
